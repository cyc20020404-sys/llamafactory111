### model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 32
lora_dropout: 0
lora_target: all

### dataset
dataset: emention
template: qwen
cutoff_len: 2048
max_samples: 10000
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: /root/autodl-tmp/llamafactory/saves/qwen2.5-3b/lora/sft
logging_steps: 1
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### swanlab
use_swanlab: true
swanlab_run_name: test_run
swanlab_api_key: rngkdCxIYxpyWdQGHnUEi

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 5
bf16: true
fp16: false
ddp_timeout: 180000000
max_steps: -1

### eval
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 50
